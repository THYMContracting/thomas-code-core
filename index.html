<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Code & Core | Alex Thomas</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --deep-purple: #7822f0;
            --bg-dark: #0a0c10;
            --card-bg: #161b22;
            --text-gray: #8b949e;
            --code-font: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: #f0f6fc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* HEADER SECTION */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        img.logo {
            max-width: 180px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
            border-radius: 50%;
            transition: transform 0.5s ease;
        }
        
        img.logo:hover {
            transform: rotate(5deg) scale(1.05);
        }

        h1 {
            font-family: var(--code-font);
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 10px 0;
        }

        /* NAVIGATION */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--deep-purple);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--code-font);
            transition: 0.3s;
            border-radius: 4px;
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--deep-purple);
            box-shadow: 0 0 10px var(--deep-purple);
        }

        /* CONTENT AREA */
        .content-section {
            display: none;
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            animation: fadeIn 0.5s ease;
            box-sizing: border-box;
        }

        .content-section.active {
            display: block;
        }
