<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Code & Core | Electronics Repair</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        img {
            max-width: 200px;
            height: auto;
        }
        h1 {
            color: #00f2ff;
            letter-spacing: 2px;
            margin-top: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #8b949e;
        }
        .tagline {
            color: #7822f0;
            font-weight: bold;
            text-transform: uppercase;
        }
        .cta-button {
            display: inline-block;
            margin-top: 2rem;
            padding: 12px 24px;
            background-color: #00f2ff;
            color: #0d1117;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }
        .cta-button:hover {
            background-color: #7822f0;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Thomas-Code-&-Core_logo.png" alt="Thomas Code & Core Logo">
        <h1>THOMAS CODE & CORE</h1>
        <p class="tagline">Repair • Resell • Revive</p>
        <p>Specializing in Game Console & Hardware Restoration.</p>
        <a href="mailto:your-email@example.com" class="cta-button">Book a Repair</a>
    </div>
</body>
</html>
